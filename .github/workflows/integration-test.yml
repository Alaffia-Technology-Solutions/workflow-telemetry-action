permissions:
  pull-requests: write
on:
  workflow_dispatch:
jobs:
  workflow-telemetry-action-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.03
      - name: Collect workflow telemetry
        uses: ./
        with:
          proc_trace_sys_enable: true
          proc_trace_chart_show: true
          proc_trace_table_show: true
      - run: |
          id
          whoami
          ls -a
          ps aux
          sleep 1
          sleep 3
          sleep 2
          find -name "*.out"
